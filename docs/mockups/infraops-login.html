<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfraOps — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --base:     #0f1117;
      --surface:  #161b22;
      --card:     #1e2530;
      --elevated: #252e3f;
      --hover:    #2a3447;

      --border:    #2d3748;
      --border-lo: #1e2737;
      --border-md: #3d4f6a;

      --tx-hi: #f0f4f8;
      --tx-md: #8b95a6;
      --tx-lo: #4a5568;

      --crit:    #f87171;  --crit-bg:  #450a0a;  --crit-bd:  #7f1d1d;
      --warn:    #fb923c;  --warn-bg:  #431407;  --warn-bd:  #7c2d12;
      --ok:      #4ade80;  --ok-bg:    #052e16;  --ok-bd:    #166534;

      --accent:  #0ea5e9;  --accent-bg: #071a29; --accent-bd: #0c3454;

      --font-ui:   -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;

      --radius:    8px;
      --radius-lg: 12px;
      --radius-sm: 6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--base);
      color: var(--tx-hi);
      font-size: 13px;
      line-height: 1.4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Ruido de fondo sutil ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(14,165,233,.07) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Contenedor centrado ── */
    .login-wrapper {
      width: 100%;
      max-width: 360px;
      padding: 24px 16px;
    }

    /* ── Marca ── */
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand__logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .brand__icon {
      width: 32px;
      height: 32px;
      background: var(--accent-bg);
      border: 1px solid var(--accent-bd);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand__name {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 500;
      color: var(--tx-hi);
      letter-spacing: -0.3px;
    }

    .brand__tagline {
      font-size: 11px;
      color: var(--tx-lo);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-family: var(--font-mono);
    }

    /* ── Card del formulario ── */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border-lo);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
    }

    .login-card__title {
      font-size: 13px;
      font-weight: 600;
      color: var(--tx-hi);
      margin-bottom: 4px;
    }

    .login-card__subtitle {
      font-size: 11px;
      color: var(--tx-md);
      margin-bottom: 24px;
    }

    /* ── Campos ── */
    .field {
      margin-bottom: 16px;
    }

    .field__label {
      display: block;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--tx-lo);
      margin-bottom: 6px;
      font-family: var(--font-mono);
    }

    .field__input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--tx-hi);
      font-family: var(--font-ui);
      font-size: 12px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field__input:focus {
      border-color: var(--accent-bd);
      box-shadow: 0 0 0 3px rgba(14,165,233,.08);
    }

    .field__input::placeholder {
      color: var(--tx-lo);
    }

    /* Estado de error en campo */
    .field--error .field__input {
      border-color: var(--crit-bd);
    }

    .field__error {
      font-size: 10px;
      color: var(--crit);
      margin-top: 5px;
      font-family: var(--font-mono);
      display: none;
    }

    .field--error .field__error {
      display: block;
    }

    /* ── Botón principal ── */
    .btn--primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 8px;
    }

    .btn--primary:hover { opacity: 0.88; }
    .btn--primary:active { opacity: 0.75; }

    .btn--primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Spinner de carga ── */
    .spinner {
      width: 12px;
      height: 12px;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Alerta de error global ── */
    .alert--error {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      background: var(--crit-bg);
      border: 1px solid var(--crit-bd);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin-bottom: 20px;
      font-size: 11px;
      color: var(--crit);
    }

    .alert--error svg {
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── Footer ── */
    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 10px;
      color: var(--tx-lo);
      font-family: var(--font-mono);
    }

    /* ──────────────────────────────
       VARIANTES DE ESTADO
       Descomentar para ver cada una
    ────────────────────────────── */

  </style>
</head>
<body>

  <div class="login-wrapper">

    <!-- Marca -->
    <div class="brand">
      <div class="brand__logo">
        <div class="brand__icon">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <path d="M8 21h8M12 17v4"/>
          </svg>
        </div>
        <span class="brand__name">InfraOps</span>
      </div>
      <div class="brand__tagline">ONDRA · Sistema de operaciones</div>
    </div>

    <!-- Card formulario — estado normal -->
    <div class="login-card" id="state-normal">
      <div class="login-card__title">Iniciar sesión</div>
      <div class="login-card__subtitle">Accedé con tu cuenta de operaciones</div>

      <div class="field">
        <label class="field__label" for="email">Email</label>
        <input
          id="email"
          class="field__input"
          type="email"
          placeholder="usuario@ondra.com.ar"
          value=""
          autocomplete="email"
        />
      </div>

      <div class="field">
        <label class="field__label" for="password">Contraseña</label>
        <input
          id="password"
          class="field__input"
          type="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <button class="btn--primary" type="submit">
        <span class="label">Ingresar</span>
      </button>
    </div>
