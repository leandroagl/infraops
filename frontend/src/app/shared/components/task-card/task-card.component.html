<!-- frontend/src/app/shared/components/task-card/task-card.component.html -->
<mat-card
  class="task-card"
  [class.active]="active"
  [ngClass]="borderClass"
  role="button"
  tabindex="0"
  (click)="selected.emit(task)"
  (keydown.enter)="selected.emit(task)"
  (keydown.space)="$event.preventDefault(); selected.emit(task)">

  <div class="tc-top">
    <div class="tc-top__info">
      <div class="tc-client">{{ task.client?.name ?? task.clientId }}</div>
    </div>
    <div *ngIf="showTechnicianAvatar && technicianInitial" class="tc-tech-avatar">
      {{ technicianInitial }}
    </div>
  </div>

  <div class="tc-bottom">
    <div class="tc-chips">
      <span *ngIf="isActive" class="urg" [ngClass]="urgencyClassStr">{{ urgencyLabelText }}</span>
      <span class="badge badge--type" [ngClass]="typeBadgeClass">{{ typeLabel }}</span>
    </div>
    <a
      *ngIf="odooLink"
      [href]="odooLink"
      target="_blank"
      rel="noopener noreferrer"
      class="tc-odoo-link"
      (click)="$event.stopPropagation()">{{ odooLabel }}</a>
  </div>
</mat-card>
