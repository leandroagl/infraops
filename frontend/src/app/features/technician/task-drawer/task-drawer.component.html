<!-- ── Header ─────────────────────────────────────────────── -->
<div class="d-hdr">
  <div class="d-icon" [ngStyle]="drawerIconStyle()">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round">
      <rect x="2" y="3" width="20" height="14" rx="2"/>
      <path d="M8 21h8M12 17v4"/>
    </svg>
  </div>
  <div style="flex:1;min-width:0">
    <div class="d-client">{{ task.client?.name ?? task.clientId }}</div>
    <div class="d-sub">{{ typeLabel(task.type) }}</div>
    <div class="d-meta">
      <span class="urg" [ngClass]="urgencyClass(daysFromToday(task.scheduledDate))">
        {{ urgencyLabel(daysFromToday(task.scheduledDate)) }}
      </span>
      <span class="badge" [ngClass]="statusBadge(task.status)">{{ statusLabel(task.status) }}</span>
      <a
        *ngIf="odooLink"
        [href]="odooLink"
        target="_blank"
        rel="noopener noreferrer"
        class="d-odoo-link">{{ odooLabel }}</a>
    </div>
  </div>
  <button mat-icon-button class="d-close" (click)="drawerClosed.emit()">
    <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<!-- ── Body ──────────────────────────────────────────────── -->
<div class="d-body">

  <div *ngIf="loadingInfra" class="infra-loading">
    <div class="skeleton" style="height:32px;border-radius:var(--radius-sm)"></div>
    <div class="skeleton" style="height:32px;border-radius:var(--radius-sm)"></div>
  </div>

  <div *ngIf="infraError" class="infra-error">{{ infraError }}</div>

  <!-- Banner solo-lectura -->
  <div *ngIf="!isActiveTask" class="d-readonly">Solo lectura — tarea completada</div>

  <!-- Formulario QNAP -->
  <app-qnap-form
    *ngIf="infrastructure && task.type === 'QNAP_MAINTENANCE'"
    [task]="task"
    [infrastructure]="infrastructure"
    [savedPayload]="savedPayload"
    [readOnly]="!isActiveTask"
    (requestComplete)="onRequestComplete($event)"
    (requestNotDone)="onRequestNotDone()">
  </app-qnap-form>

  <!-- Formulario VEEAM BACKUP -->
  <app-veeam-form
    *ngIf="infrastructure && task.type === 'VEEAM_BACKUP'"
    [vms]="veeamVms"
    [existingPayload]="veeamPayload"
    [readOnly]="!isActiveTask"
    (saved)="onRequestComplete($event)"
    (cancelled)="drawerClosed.emit()">
  </app-veeam-form>

  <!-- Formulario SERVER_HOST_MAINTENANCE -->
  <app-server-host-form
    *ngIf="infrastructure && task.type === 'SERVER_HOST_MAINTENANCE'"
    [task]="task"
    [infrastructure]="infrastructure"
    [savedPayload]="savedPayload"
    [readOnly]="!isActiveTask"
    (requestComplete)="onRequestComplete($event)"
    (requestSave)="onRequestSave($event)"
    (requestNotDone)="onRequestNotDone()">
  </app-server-host-form>

  <!-- Formulario WINDOWS_DOMAIN_MAINTENANCE + TERMINAL_MAINTENANCE + SITE_VISIT + otros -->
  <app-maintenance-form
    *ngIf="infrastructure && task.type !== 'QNAP_MAINTENANCE' && task.type !== 'VEEAM_BACKUP' && task.type !== 'SERVER_HOST_MAINTENANCE'"
    [task]="task"
    [infrastructure]="infrastructure"
    [savedPayload]="savedPayload"
    [readOnly]="!isActiveTask"
    (requestComplete)="onRequestComplete($event)"
    (requestSave)="onRequestSave($event)"
    (requestNotDone)="onRequestNotDone()">
  </app-maintenance-form>

</div>

<!-- ── Footer solo-lectura ────────────────────────────────── -->
<div class="d-footer" *ngIf="!isActiveTask">
  <div class="d-footer__actions">
    <button mat-stroked-button (click)="drawerClosed.emit()">Cerrar</button>
  </div>
</div>

<!-- ── Footer activo ──────────────────────────────────────── -->
<div class="d-footer" *ngIf="isActiveTask">

  <div class="d-footer__actions">
    <!-- WINDOWS_DOMAIN_MAINTENANCE -->
    <ng-container *ngIf="task.type === 'WINDOWS_DOMAIN_MAINTENANCE'">
      <button mat-flat-button color="primary" (click)="triggerFormComplete()" [disabled]="completing">
        <mat-spinner *ngIf="completing" [diameter]="16"></mat-spinner>
        <span *ngIf="!completing">Completar mantenimiento</span>
      </button>
      <button mat-stroked-button (click)="triggerFormSave()" [disabled]="completing">Guardar progreso</button>
      <button mat-stroked-button (click)="drawerClosed.emit()" [disabled]="completing">Cerrar</button>
    </ng-container>

    <!-- SERVER_HOST_MAINTENANCE -->
    <ng-container *ngIf="task.type === 'SERVER_HOST_MAINTENANCE'">
      <button mat-flat-button color="primary" (click)="triggerFormComplete()" [disabled]="completing">
        <mat-spinner *ngIf="completing" [diameter]="16"></mat-spinner>
        <span *ngIf="!completing">Completar mantenimiento</span>
      </button>
      <button mat-stroked-button (click)="triggerServerHostSave()" [disabled]="completing">Guardar progreso</button>
      <button mat-stroked-button (click)="drawerClosed.emit()" [disabled]="completing">Cerrar</button>
    </ng-container>

    <!-- TERMINAL_MAINTENANCE | SITE_VISIT -->
    <ng-container *ngIf="task.type === 'TERMINAL_MAINTENANCE' || task.type === 'SITE_VISIT'">
      <button mat-flat-button color="primary" (click)="triggerFormComplete()" [disabled]="completing">
        <mat-spinner *ngIf="completing" [diameter]="16"></mat-spinner>
        <span *ngIf="!completing">Marcar visita como realizada</span>
      </button>
      <button mat-flat-button color="warn" (click)="onRequestNotDone()" [disabled]="completing">No concretada</button>
    </ng-container>

    <!-- QNAP_MAINTENANCE -->
    <ng-container *ngIf="task.type === 'QNAP_MAINTENANCE'">
      <button mat-flat-button color="primary" (click)="triggerFormComplete()" [disabled]="completing">
        <mat-spinner *ngIf="completing" [diameter]="16"></mat-spinner>
        <span *ngIf="!completing">Completar mantenimiento</span>
      </button>
      <button mat-stroked-button color="warn" (click)="onRequestNotDone()" [disabled]="completing">No concretada</button>
      <button mat-stroked-button (click)="drawerClosed.emit()" [disabled]="completing">Cerrar</button>
    </ng-container>

    <!-- VEEAM_BACKUP -->
    <ng-container *ngIf="task.type === 'VEEAM_BACKUP'">
      <button mat-flat-button color="primary" (click)="triggerFormComplete()" [disabled]="completing">
        <mat-spinner *ngIf="completing" [diameter]="16"></mat-spinner>
        <span *ngIf="!completing">Completar mantenimiento</span>
      </button>
      <button mat-stroked-button color="warn" (click)="onRequestNotDone()" [disabled]="completing">No concretada</button>
      <button mat-stroked-button (click)="drawerClosed.emit()" [disabled]="completing">Cerrar</button>
    </ng-container>

    <!-- Tipos sin formulario -->
    <ng-container *ngIf="task.type === 'AV_CONTROL' || task.type === 'UPS_CONTROL' || task.type === 'ENDPOINT_INVENTORY'">
      <button mat-flat-button color="primary" disabled>Completar</button>
    </ng-container>
  </div>

  <p *ngIf="confirmError" class="d-footer__err">{{ confirmError }}</p>
  <p *ngIf="saveProgressMsg" class="d-footer__ok">{{ saveProgressMsg }}</p>
  <p *ngIf="saveProgressError" class="d-footer__err">{{ saveProgressError }}</p>

</div>
