<h2 mat-dialog-title style="font-size:15px;font-weight:600;color:var(--tx-hi);margin:0 0 16px">
  Nueva tarea
</h2>

<mat-dialog-content>
  <div *ngIf="loading" style="color:var(--tx-lo);font-size:12px;padding:8px 0">Cargando...</div>

  <form *ngIf="!loading" [formGroup]="form" style="display:flex;flex-direction:column;gap:14px">

    <div class="field">
      <label class="field__label">Cliente</label>
      <select formControlName="clientId" class="input">
        <option value="">Seleccioná un cliente...</option>
        <option *ngFor="let c of clients" [value]="c.id">{{ c.name }}</option>
      </select>
    </div>

    <div class="field">
      <label class="field__label">Técnico</label>
      <select formControlName="technicianId" class="input">
        <option value="">Seleccioná un técnico...</option>
        <option *ngFor="let t of technicians" [value]="t.id">{{ t.user.name }}</option>
      </select>
    </div>

    <div class="field">
      <label class="field__label">Tipo de tarea</label>
      <select formControlName="type" class="input">
        <option *ngFor="let t of taskTypes" [value]="t.value">{{ t.label }}</option>
      </select>
    </div>

    <div class="field">
      <label class="field__label">Fecha programada</label>
      <input formControlName="scheduledDate" type="date" class="input" />
    </div>

  </form>

  <div *ngIf="error" style="margin-top:12px;font-size:12px;color:var(--crit)">{{ error }}</div>
</mat-dialog-content>

<mat-dialog-actions align="end" style="gap:8px;padding-top:16px">
  <button class="btn btn--secondary" (click)="cancel()">Cancelar</button>
  <button class="btn btn--primary" (click)="confirm()"
          [disabled]="!form || form.invalid || saving">
    {{ saving ? 'Creando...' : 'Crear tarea' }}
  </button>
</mat-dialog-actions>
