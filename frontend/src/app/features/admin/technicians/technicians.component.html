<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-header__title">Técnicos</h1>
      <span class="page-header__count" *ngIf="!loading">{{ technicians.length }} perfiles técnicos</span>
    </div>
    <button class="btn btn--primary" (click)="openAssignDialog()">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <line x1="19" y1="8" x2="19" y2="14"/>
        <line x1="22" y1="11" x2="16" y2="11"/>
      </svg>
      Asignar técnico
    </button>
  </div>

  <div *ngIf="error" class="error-banner">
    {{ error }}
    <button class="btn btn--secondary" style="padding:4px 10px;font-size:12px" (click)="load()">Reintentar</button>
  </div>

  <div class="surface-card">
    <ng-container *ngIf="loading">
      <div style="padding:16px;display:flex;flex-direction:column;gap:8px">
        <div class="skeleton" style="height:38px;border-radius:var(--radius-sm)"></div>
        <div class="skeleton" style="height:38px;border-radius:var(--radius-sm)"></div>
        <div class="skeleton" style="height:38px;border-radius:var(--radius-sm)"></div>
      </div>
    </ng-container>

    <table *ngIf="!loading" class="data-table">
      <thead>
        <tr>
          <th>TÉCNICO</th>
          <th>ROL</th>
          <th>ESTADO</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let tech of technicians">
          <td>
            <div class="user-info">
              <span class="user-name">{{ tech.user.name }}</span>
              <span class="user-email">{{ tech.user.email }}</span>
            </div>
          </td>
          <td>
            <span class="badge" [ngClass]="roleBadgeClass(tech.user.role)">
              {{ roleLabel(tech.user.role) }}
            </span>
          </td>
          <td>
            <span class="badge" [ngClass]="tech.user.isActive ? 'badge--ok' : 'badge--neutral'">
              <span class="dot"></span>
              {{ tech.user.isActive ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
          <td class="td-actions">
            <button class="actions-btn actions-btn--danger" title="Quitar perfil técnico" (click)="remove(tech)">
              <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
            </button>
          </td>
        </tr>
        <tr *ngIf="technicians.length === 0">
          <td colspan="4" class="empty-state">No hay técnicos asignados</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
