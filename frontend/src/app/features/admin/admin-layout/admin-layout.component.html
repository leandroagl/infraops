<div class="admin-layout">
  <nav mat-tab-nav-bar [tabPanel]="tabPanel">
    <a mat-tab-link
       *ngFor="let tab of tabs"
       [routerLink]="tab.path"
       [active]="isActive(tab.path)">
      {{ tab.label }}
    </a>
  </nav>
  <mat-tab-nav-panel #tabPanel>
    <router-outlet></router-outlet>
  </mat-tab-nav-panel>
</div>
