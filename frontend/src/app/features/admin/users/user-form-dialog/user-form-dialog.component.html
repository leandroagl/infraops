<h2 mat-dialog-title>
  {{ data.mode === 'create' ? 'Nuevo usuario' : 'Editar usuario' }}
</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">

    <mat-form-field appearance="fill">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="name" placeholder="Nombre completo" />
      <mat-error *ngIf="form.get('name')?.hasError('required')">Requerido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email" placeholder="email@ondra.com.ar" />
      <mat-error *ngIf="form.get('email')?.hasError('email')">Email inválido</mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill">
      <mat-label>Rol</mat-label>
      <mat-select formControlName="role">
        <mat-option *ngFor="let r of roles" [value]="r.value">{{ r.label }}</mat-option>
      </mat-select>
    </mat-form-field>

    <div *ngIf="error" class="error-banner">{{ error }}</div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary"
          [disabled]="form.invalid || loading"
          (click)="submit()">
    <mat-spinner *ngIf="loading" diameter="16" style="display:inline-block;margin-right:6px"></mat-spinner>
    {{ loading ? 'Guardando…' : data.mode === 'create' ? 'Crear usuario' : 'Guardar cambios' }}
  </button>
</mat-dialog-actions>
