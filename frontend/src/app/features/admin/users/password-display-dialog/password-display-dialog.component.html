<h2 mat-dialog-title>Contraseña temporal</h2>

<mat-dialog-content>
  <p style="color:var(--tx-md);font-size:13px;margin:0 0 16px">
    Contraseña generada para
    <strong style="color:var(--tx-hi)">{{ data.name }}</strong>.<br>
    Guardala ahora — no se va a mostrar de nuevo.
  </p>
  <div class="password-box">
    <span class="mono" style="font-size:14px;color:var(--tx-hi);letter-spacing:0.05em">
      {{ data.plainPassword }}
    </span>
    <button mat-stroked-button (click)="copy()">
      {{ copied ? '¡Copiado!' : 'Copiar' }}
    </button>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-flat-button color="primary" (click)="close()">Listo</button>
</mat-dialog-actions>
