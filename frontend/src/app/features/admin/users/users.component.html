<div class="users-page">
  <div class="users-header">
    <div>
      <h1 class="users-header__title">Usuarios</h1>
      <span class="users-header__count" *ngIf="!loading">{{ users.length }} usuarios registrados</span>
    </div>
    <button mat-flat-button color="primary" (click)="openCreateDialog()">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;margin-right:4px;vertical-align:middle">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <line x1="19" y1="8" x2="19" y2="14"/>
        <line x1="22" y1="11" x2="16" y2="11"/>
      </svg>
      Nuevo usuario
    </button>
  </div>

  <div *ngIf="error" class="error-banner">
    {{ error }}
    <button mat-button (click)="loadUsers()">Reintentar</button>
  </div>

  <div class="surface-card">
    <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

    <mat-table *ngIf="!loading" [dataSource]="users">

      <ng-container matColumnDef="user">
        <th mat-header-cell *matHeaderCellDef>USUARIO</th>
        <td mat-cell *matCellDef="let user">
          <div class="user-info">
            <span class="user-name">{{ user.name }}</span>
            <span class="user-email">{{ user.email }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>ROL</th>
        <td mat-cell *matCellDef="let user">
          <span class="badge" [ngClass]="roleBadgeClass(user.role)">
            {{ roleLabel(user.role) }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>ESTADO</th>
        <td mat-cell *matCellDef="let user">
          <span class="badge" [ngClass]="user.isActive ? 'badge--ok' : 'badge--neutral'">
            <span class="dot"></span>
            {{ user.isActive ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let user" class="td-actions">
          <ng-container *ngIf="!isCurrentUser(user)">
            <button mat-icon-button [matMenuTriggerFor]="menu">
              <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor">
                <circle cx="12" cy="5" r="1.5"/>
                <circle cx="12" cy="12" r="1.5"/>
                <circle cx="12" cy="19" r="1.5"/>
              </svg>
            </button>
            <mat-menu #menu="matMenu" xPosition="before">
              <button mat-menu-item *ngIf="!isSeedAdmin(user)" (click)="openEditDialog(user)">
                <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;margin-right:8px;vertical-align:middle">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
                Editar
              </button>
              <button mat-menu-item *ngIf="!isSeedAdmin(user)" (click)="toggleStatus(user)">
                <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;margin-right:8px;vertical-align:middle">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
                </svg>
                {{ user.isActive ? 'Desactivar' : 'Activar' }}
              </button>
              <button mat-menu-item (click)="resetPassword(user)">
                <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;margin-right:8px;vertical-align:middle">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
                </svg>
                Resetear contraseña
              </button>
            </mat-menu>
          </ng-container>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr class="mat-mdc-no-data-row" *matNoDataRow>
        <td [attr.colspan]="displayedColumns.length">No hay usuarios registrados.</td>
      </tr>
    </mat-table>
  </div>
</div>
